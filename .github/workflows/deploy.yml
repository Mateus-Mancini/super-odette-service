name: Deploy to Cloud Run

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: |
            ~ ~/.m2/repository
            !~/.m2/repository/org/postgresql
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build project (Clean and AOT preparation)
        run: ./mvnw -DskipTests clean package

      - name: Build Native Image
        run: ./mvnw -Pnative spring-boot:build-image -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag and Push Docker image with Versioning
        run: |
          # Define the unique tag
          IMAGE_TAG=1.0.${{ github.run_number }}
          FULL_IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/ms-super-odette:$IMAGE_TAG
          
          # Tag the image built by Spring Boot
          docker tag ms-super-odette:0.0.1-SNAPSHOT $FULL_IMAGE_NAME
          
          # Push the specific version
          docker push $FULL_IMAGE_NAME
          
          # Also update 'latest' for convenience, but we won't deploy with it
          docker tag $FULL_IMAGE_NAME ${{ secrets.DOCKER_USERNAME }}/ms-super-odette:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/ms-super-odette:latest

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ secrets.GCP_SERVICE_NAME }} \
            --image docker.io/${{ secrets.DOCKER_USERNAME }}/ms-super-odette:1.0.${{ github.run_number }} \
            --region ${{ secrets.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --cpu-boost \
            --min-instances=0 \
            --set-env-vars APP_NAME=${{ secrets.APP_NAME }},DB_URL=${{ secrets.DB_URL }},DB_USERNAME=${{ secrets.DB_USERNAME }},DB_PASSWORD=${{ secrets.DB_PASSWORD }},REDIS_HOST=${{ secrets.REDIS_HOST }},REDIS_PORT=${{ secrets.REDIS_PORT }},REDIS_USERNAME=${{ secrets.REDIS_USERNAME }},REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }},REDIS_SSL=${{ secrets.REDIS_SSL }},LAZY_INIT=${{ secrets.LAZY_INIT }},JPA_DDL=${{ secrets.JPA_DDL }},SHOW_SQL=${{ secrets.SHOW_SQL }},FORMAT_SQL=${{ secrets.FORMAT_SQL }},LOB_CREATION=${{ secrets.LOB_CREATION }} \
            --quiet